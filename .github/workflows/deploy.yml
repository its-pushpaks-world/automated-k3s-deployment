name: Deploy Nginx to K3s

on:
  pull_request:
    branches:
      - main
    paths:
      - 'K3s-manifests/**'

env:
  KUBECONFIG: ${{ github.workspace }}/kubeconfig

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure Kubeconfig Programmatically
        env:
          RAW_KUBECONFIG: ${{ secrets.KUBECONFIG }}
        run: |
          # Write the completely untouched, clean secret to a file
          echo "$RAW_KUBECONFIG" > $KUBECONFIG
          
          # Dynamically swap 127.0.0.1 with the GitHub Repo Variable
          sed -i "s/127.0.0.1/${{ vars.EC2_PUBLIC_IP }}/g" $KUBECONFIG
          
          # Wipe out the certificate authority line to bypass strict local x509 validation
          sed -i '/certificate-authority-data:/d' $KUBECONFIG
          
          # Inject insecure skip flag right under cluster definition
          sed -i '/cluster:/a \    insecure-skip-tls-verify: true' $KUBECONFIG
          
          chmod 600 $KUBECONFIG

      - name: Deploy to K3s Cluster
        run: |
          kubectl apply -f K3s-manifests/nginx-deployment.yaml
          
      - name: Verify Deployment
        run: |
          kubectl get deployments
          kubectl get services
